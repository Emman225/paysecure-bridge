<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>FNE Connect - PaySecure Bridge</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#f0f9ff,#e0e7ff);color:#111827;text-align:center;padding:1rem}
  .card{padding:2.5rem 2rem;background:#fff;border-radius:1.25rem;box-shadow:0 10px 40px rgba(37,99,235,.12);max-width:520px;width:100%}
  h1{font-size:1.4rem;margin:0 0 .5rem;color:#1e3a8a}
  h2{font-size:1.05rem;margin:.25rem 0 1rem;color:#1e3a8a}
  p{color:#6b7280;font-size:.9rem;line-height:1.55;margin:.5rem 0}
  a.btn{display:inline-block;margin-top:1rem;padding:.75rem 1.25rem;background:#2563eb;color:#fff;text-decoration:none;border-radius:.5rem;font-weight:600;font-size:.875rem}
  a.btn:hover{background:#1d4ed8}
  .spinner{width:42px;height:42px;border:3px solid #e0e7ff;border-top-color:#2563eb;border-radius:50%;animation:spin .9s linear infinite;margin:1rem auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.75rem;color:#94a3b8;margin-top:1rem;word-break:break-all;background:#f8fafc;padding:.5rem;border-radius:.5rem;text-align:left}
  .badge{display:inline-block;padding:.25rem .75rem;background:#dcfce7;color:#166534;border-radius:999px;font-size:.75rem;font-weight:600;margin-bottom:1rem}
  .status{text-align:left;background:#f8fafc;padding:1rem;border-radius:.5rem;margin:1rem 0}
  .status code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.8rem;color:#1e40af}
  .row{display:flex;justify-content:space-between;padding:.25rem 0;font-size:.8rem;color:#475569}
  .row span:last-child{color:#0f172a;font-weight:500}
  details{text-align:left;margin-top:1rem;font-size:.8rem;color:#475569}
  details summary{cursor:pointer;font-weight:600;color:#1e3a8a;padding:.5rem 0}
  pre{background:#0f172a;color:#e2e8f0;padding:.75rem;border-radius:.5rem;overflow-x:auto;font-size:.7rem;line-height:1.4}
  #manual{display:none;margin-top:1rem}
</style>
</head>
<body>
<div class="card" id="card">
  <!-- Contenu rendu dynamiquement par JavaScript -->
</div>
<script>
(function () {
  var card     = document.getElementById('card');
  var params   = new URLSearchParams(window.location.search);
  var path     = window.location.pathname || '/';
  var pathParts = path.split('/').filter(Boolean);

  // Detecte si on est sur la racine (pas de path significatif)
  var isRoot = path === '/' || path === '' || path === '/index.html' || path === '/404.html';

  // Detecte un code paiement :
  //   - dans la query (?code=XXX)
  //   - dans le dernier segment du path (XXX-AAAAAAAA...)
  // Le code paiement genere par le backend a le format : PREFIXE-XXXXXXXXXXXXXXXX
  var codeQuery = params.get('code');
  var lastSeg   = pathParts[pathParts.length - 1] || '';
  var looksLikeCode = /^[A-Z]{2,5}-[A-Za-z0-9_-]{8,32}$/.test(lastSeg);

  var code = codeQuery || (looksLikeCode && !isRoot ? lastSeg : '');
  var hasPaySecureContext = !!code;

  if (!hasPaySecureContext) {
    renderStatusPage();
    return;
  }

  redirectToFrontend(code);

  // ==========================================================================

  function renderStatusPage() {
    var bridgeOrigin = window.location.origin;
    card.innerHTML =
      '<div class="badge">PaySecure Bridge actif</div>' +
      '<h1>FNE Connect Bridge</h1>' +
      '<p>Cette URL sert de pont HTTPS entre PaySecure et votre frontend FNE Connect en developpement local.</p>' +
      '<div class="status">' +
        '<div class="row"><span>Statut</span><span style="color:#16a34a">OK</span></div>' +
        '<div class="row"><span>URL bridge</span><span><code>' + bridgeOrigin + '</code></span></div>' +
        '<div class="row"><span>Mode</span><span>Standby (aucun code paiement detecte)</span></div>' +
      '</div>' +
      '<p style="font-size:.8rem;color:#94a3b8;margin-top:1rem">Cette page se redirige automatiquement vers votre frontend uniquement lorsqu\'elle est appelee par PaySecure apres un paiement.</p>' +
      '<details>' +
        '<summary>Comment configurer le backend FNE Connect</summary>' +
        '<p style="margin-top:.75rem">Dans <code>.env</code> du backend Laravel :</p>' +
        '<pre>PAYSECURE_BASE_URL=' + bridgeOrigin + '</pre>' +
        '<p>Puis :</p>' +
        '<pre>php artisan config:clear</pre>' +
      '</details>' +
      '<details>' +
        '<summary>Tester manuellement la redirection</summary>' +
        '<p style="margin-top:.75rem">Visiter cette URL pour simuler un retour PaySecure :</p>' +
        '<pre>' + bridgeOrigin + '/paysecure-return/SUB-TEST12345?frontend=http%3A%2F%2Flocalhost%3A5173&status=success</pre>' +
      '</details>';
  }

  function redirectToFrontend(code) {
    var frontend = params.get('frontend') || 'http://localhost:5173';
    var newParams = new URLSearchParams();
    newParams.set('code', code);
    newParams.set('status', params.get('status') || 'success');
    ['service', 'service_id', 'reference', 'amount', 'currency', 'method'].forEach(function(k){
      var v = params.get(k); if (v) newParams.set(k, v);
    });

    var target = frontend.replace(/\/+$/, '') + '/payment/result?' + newParams.toString();

    card.innerHTML =
      '<div class="spinner"></div>' +
      '<h1>Redirection vers FNE Connect</h1>' +
      '<p>Votre paiement PaySecure a ete pris en compte.<br>Retour automatique vers votre application en cours...</p>' +
      '<div id="manual">' +
        '<a id="link" class="btn" href="' + target + '">Cliquer pour continuer</a>' +
        '<p class="code">' + target + '</p>' +
      '</div>';

    document.getElementById('manual').style.display = 'block';
    setTimeout(function(){ window.location.replace(target); }, 800);
  }
})();
</script>
</body>
</html>
