<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>FNE Connect - Redirection PaySecure</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#f0f9ff,#e0e7ff);color:#111827;text-align:center;padding:1rem}
  .card{padding:2.5rem 2rem;background:#fff;border-radius:1.25rem;box-shadow:0 10px 40px rgba(37,99,235,.12);max-width:440px;width:100%}
  h1{font-size:1.25rem;margin:0 0 .5rem;color:#1e3a8a}
  p{color:#6b7280;font-size:.9rem;line-height:1.5;margin:.5rem 0}
  a.btn{display:inline-block;margin-top:1rem;padding:.75rem 1.25rem;background:#2563eb;color:#fff;text-decoration:none;border-radius:.5rem;font-weight:600;font-size:.875rem}
  .spinner{width:42px;height:42px;border:3px solid #e0e7ff;border-top-color:#2563eb;border-radius:50%;animation:spin .9s linear infinite;margin:1rem auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.75rem;color:#94a3b8;margin-top:1rem;word-break:break-all}
  #manual{display:none;margin-top:1rem}
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h1>Redirection vers FNE Connect</h1>
  <p>Votre paiement PaySecure a été pris en compte.<br>Retour automatique vers votre application...</p>
  <div id="manual">
    <a id="link" class="btn" href="#">Cliquer pour continuer</a>
    <p class="code" id="target"></p>
  </div>
</div>
<script>
(function () {
  // Le path d'arrivee est /api/v1/paysecure/return/{code} (envoye par PaySecure)
  // Le query param ?frontend=... indique vers quel frontend rediriger.
  var params   = new URLSearchParams(window.location.search);
  var frontend = params.get('frontend') || 'http://localhost:5173';

  // Extrait le code paiement du path (dernier segment non vide)
  var pathParts = window.location.pathname.split('/').filter(Boolean);
  var code      = pathParts[pathParts.length - 1] || params.get('code') || '';

  // Reconstruit l'URL vers la page de resultat du frontend
  var newParams = new URLSearchParams();
  if (code) newParams.set('code', code);
  newParams.set('status', params.get('status') || 'success');
  ['service', 'service_id', 'reference', 'amount', 'currency', 'method'].forEach(function(k){
    var v = params.get(k); if (v) newParams.set(k, v);
  });

  var target = frontend.replace(/\/+$/, '') + '/payment/result?' + newParams.toString();

  document.getElementById('link').href = target;
  document.getElementById('target').textContent = target;
  document.getElementById('manual').style.display = 'block';

  // Redirection automatique
  setTimeout(function(){ window.location.replace(target); }, 800);
})();
</script>
</body>
</html>
